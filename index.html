<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Configurações do ecossistema Visual Studio & Security
    const TELEGRAM_TOKEN = '8647035778:AAGe5pkNdG10peE82phy8_hAp0D3VHJ9g7c';
    const TELEGRAM_CHAT_ID = '5295558906'; // Pegue no getUpdates após enviar um /start para o bot

    // Inicializa Widget TradingView (BTC/USDT no tempo de 30min)
    new TradingView.widget({
        "width": "100%", "height": 600, "symbol": "BINANCE:BTCUSDT",
        "interval": "30", "theme": "dark", "container_id": "tradingview_btc"
    });

    let lastPrice = 0;
    const alertAudio = document.getElementById('alert_sound');

    // Função de Alerta via Telegram
    async function notifyTelegram(msg) {
        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: `🚀 [VISUAL CRIPTO ALERT]\n\n${msg}`,
                    parse_mode: 'Markdown'
                })
            });
        } catch (e) { console.error("Erro ao notificar Telegram"); }
    }

    async function updateHub() {
        const start = Date.now();
        try {
            // Fetch da API da Binance
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            const data = await res.json();
            
            // Atualiza Latência de Rede
            document.getElementById('ping').innerText = `Latência: ${Date.now() - start}ms`;

            const price = parseFloat(data.price);
            const container = document.getElementById('main_hub');

            if (lastPrice > 0) {
                const change = ((price - lastPrice) / lastPrice) * 100;

                // Alerta em variações de 0.1% (Alta ou Queda)
                if (Math.abs(change) >= 0.1) {
                    alertAudio.play();
                    
                    const direction = change > 0 ? '🟢 ALTA' : '🔴 QUEDA';
                    container.className = change > 0 ? 'chart-container gain-active' : 'chart-container alert-active';
                    
                    // Envia alerta para o seu Telegram
                    notifyTelegram(`*Movimentação Detectada!*\nSentido: ${direction}\nVariação: ${change.toFixed(2)}%\nPreço: $${price.toLocaleString()}`);
                } else {
                    container.className = 'chart-container';
                }
            }
            lastPrice = price;
        } catch (e) { 
            console.error("Falha no Sync");
            if (typeof Sentry !== 'undefined') Sentry.captureException(e); 
        }
    }

    // Intervalo de 5 segundos para não sobrecarregar a API nem o seu bot
    setInterval(updateHub, 5000); 
</script>
